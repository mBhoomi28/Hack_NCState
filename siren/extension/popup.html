<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siren-X Forensics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>SIREN-X FORENSICS</h1>
      <p class="tagline">Misinformation & Deceptive AI Detection</p>
    </header>

    <section class="scan-section">
      <button type="button" id="scanBtn" class="btn-scan">INITIATE SCAN</button>
      <p id="status" class="status hidden"></p>
    </section>

    <section id="report" class="report hidden">
      <h2>CLASSIFIED REPORT</h2>
      <div class="verdict-row">
        <span id="verdict" class="verdict">—</span>
      </div>
      <div class="score-block">
        <label>Risk Score</label>
        <div class="progress-wrap">
          <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>
        <span id="scoreValue" class="score-value">0</span>
      </div>
      <div class="meta-row">
        <span class="label">Primary trigger:</span>
        <span id="primaryTrigger">—</span>
      </div>
      <div class="meta-row">
        <span class="label">AI likelihood:</span>
        <span id="aiLikelihood">—</span>
      </div>
      <p id="summary" class="summary">—</p>
      <div class="patterns-block">
        <label>Detected Patterns</label>
        <div id="patterns" class="patterns"></div>
      </div>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
